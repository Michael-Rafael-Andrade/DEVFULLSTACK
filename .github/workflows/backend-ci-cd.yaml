name: Backend CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    # Inicializa o contêiner do MongoDB em plano de fundo no GitHub runner
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Instalar Dependências
        run: |
          cd backend
          npm ci

      - name: Executar Testes Automatizados
        run: |
          cd backend
          npm test
        env:
          MONGO_URL: mongodb://localhost:27017/teste-ci
          AI_API_URL: https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
          AI_API_KEY: chave-ficticia-teste-ci